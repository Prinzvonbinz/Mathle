<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Math Wordle</title>

<style>
body{
background:#0f1115;
color:white;
font-family:Arial;
text-align:center;
margin:0;
}

h1{margin-top:20px;}

#top{
display:flex;
justify-content:center;
gap:40px;
align-items:center;
margin:20px;
}

#target{
font-size:40px;
font-weight:bold;
}

#hearts{
font-size:28px;
color:#ff4d4d;
}

#timer{
width:300px;
height:10px;
background:#333;
margin:auto;
border-radius:10px;
overflow:hidden;
}

#bar{
height:100%;
width:100%;
background:#4cafef;
transition:width .1s linear;
}

#grid{
display:grid;
justify-content:center;
gap:10px;
margin-top:30px;
}

.cell{
width:70px;
height:70px;
background:#1c2028;
border-radius:10px;
display:flex;
justify-content:center;
align-items:center;
font-size:26px;
cursor:pointer;
transition:.15s;
}

.cell:hover{
background:#2a2f3a;
transform:scale(1.05);
}

.cell.selected{
background:#4cafef;
}

#overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#0f1115;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
font-size:24px;
}

button{
padding:10px 20px;
font-size:18px;
border:none;
border-radius:8px;
background:#4cafef;
color:white;
cursor:pointer;
margin-top:20px;
}
</style>
</head>

<body>

<h1>Math Wordle</h1>

<div id="top">
<div id="target"></div>
<div id="hearts">❤️❤️❤️</div>
</div>

<div id="timer">
<div id="bar"></div>
</div>

<div id="grid"></div>

<div id="overlay">
<div id="result"></div>
<div id="stats"></div>
<button onclick="startGame()">Nochmal spielen</button>
</div>

<script>

let rows=4
let cols=4
let board=[]
let selected=[]
let hearts=3
let score=0
let operation="+"

let timeLimit=15
let timeLeft=15
let timer
let target=0

const grid=document.getElementById("grid")
const targetEl=document.getElementById("target")
const heartsEl=document.getElementById("hearts")
const bar=document.getElementById("bar")

function rand(n){
return Math.floor(Math.random()*n)+1
}

function generateBoard(){

board=[]
grid.innerHTML=""
grid.style.gridTemplateColumns=`repeat(${cols},70px)`

for(let i=0;i<rows*cols;i++){

let num=rand(10)
board.push(num)

let d=document.createElement("div")
d.className="cell"
d.innerText=num

d.onclick=()=>selectCell(d,i)

grid.appendChild(d)
}

}

function selectCell(el,i){

if(el.classList.contains("selected")) return

el.classList.add("selected")
selected.push({value:board[i],index:i,el})

if(selected.length==2){
checkAnswer()
}

}

function calc(a,b){

switch(operation){
case "+": return a+b
case "-": return a-b
case "*": return a*b
case "÷": return a/b
}

}

function checkAnswer(){

let a=selected[0].value
let b=selected[1].value

if(calc(a,b)==target){

score++

selected.forEach(s=>{
board[s.index]=rand(10)
s.el.innerText=board[s.index]
s.el.classList.remove("selected")
})

selected=[]
nextTarget()

}else{

selected.forEach(s=>s.el.classList.remove("selected"))
selected=[]

}

}

function findTarget(){

let attempts=0

while(attempts<100){

let i=Math.floor(Math.random()*board.length)
let j=Math.floor(Math.random()*board.length)

if(i==j) continue

let a=board[i]
let b=board[j]

let result=calc(a,b)

if(operation=="÷" && a%b!==0){
attempts++
continue
}

if(result>0 && result<=100){
return result
}

attempts++
}

return rand(10)

}

function nextTarget(){

updateDifficulty()

target=findTarget()

targetEl.innerText=`${operation} = ${target}`

resetTimer()

}

function updateDifficulty(){

if(score==5) operation="-"
if(score==10) operation="*"
if(score==15) operation="÷"

if(score==20) timeLimit=10
if(score==25) timeLimit=7

if(score==30) rows=3
if(score==35) rows=2
if(score==40) rows=1

if(score==45){
win()
}

generateBoard()

}

function resetTimer(){

clearInterval(timer)

timeLeft=timeLimit
bar.style.width="100%"

timer=setInterval(()=>{

timeLeft-=0.1
bar.style.width=(timeLeft/timeLimit*100)+"%"

if(timeLeft<=0){

clearInterval(timer)
loseHeart()

}

},100)

}

function loseHeart(){

hearts--

heartsEl.innerText="❤️".repeat(hearts)

if(hearts<=0){
gameOver()
}else{
nextTarget()
}

}

function gameOver(){

clearInterval(timer)

let best=localStorage.getItem("mathHighscore")||0

if(score>best){
best=score
localStorage.setItem("mathHighscore",score)
}

document.getElementById("overlay").style.display="flex"

document.getElementById("result").innerText="Game Over"
document.getElementById("stats").innerText=
"Punkte: "+score+" | Highscore: "+best

}

function win(){

clearInterval(timer)

document.getElementById("overlay").style.display="flex"
document.getElementById("result").innerText="Du hast gewonnen!"
document.getElementById("stats").innerText="Score: "+score

}

function startGame(){

document.getElementById("overlay").style.display="none"

rows=4
cols=4
score=0
hearts=3
operation="+"
timeLimit=15

heartsEl.innerText="❤️❤️❤️"

generateBoard()
nextTarget()

}

startGame()

</script>

</body>
</html>
